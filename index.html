<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portfólio Interativo</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: radial-gradient(circle at top, #1b1b1b, #070707);
    color: #fff;
    overflow-x: hidden;
}

/* fundo animado sutil */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(255,0,120,0.05), transparent 45%);
    animation: floatBg 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatBg {
    from { transform: scale(1); filter: blur(0px); }
    to { transform: scale(1.08); filter: blur(6px); }
}

/* HEADER */
h1 {
    text-align: center;
    padding: 40px 10px 10px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;

    background: linear-gradient(90deg, #ffffff, #9aa0ff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

body::after {
    content: "PORTFÓLIO • INTERACTIVE EXPERIENCE DESIGN\A Transformando espaços em experiências vivas através de tecnologia e interação.";
    display: block;
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.4;
    margin-top: -5px;
    margin-bottom: 50px;
    white-space: pre;
}

/* SEÇÃO */
.section {
    max-width: 1200px;
    margin: 50px auto;
    padding: 25px 20px;

    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;

    backdrop-filter: blur(6px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);

    animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* TÍTULO */
.section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    padding-left: 12px;
    border-left: 3px solid #6c6c6c;
    opacity: 0.9;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 260px;
    gap: 14px;
}

/* CARD */
.slot {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: pointer;

    transition: transform 0.25s ease, box-shadow 0.25s ease, border 0.25s ease;
}

.slot:hover {
    transform: scale(1.05);
    box-shadow: 0 18px 50px rgba(0,0,0,0.65);
    border-color: #444;
}

/* mídia */
.slot img,
.slot iframe {
    width: 100%;
    height: 70%;
    object-fit: cover;
}

/* descrição */
.desc {
    height: 30%;
    padding: 8px 10px;
    font-size: 11px;
    color: #ddd;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
    display: flex;
    align-items: center;
}

/* vazio */
.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    opacity: 0.4;
    height: 100%;
}

/* overlay */
.slot::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.25), transparent);
    pointer-events: none;
}

/* =========================
   HERO / PERFIL
========================= */

.hero {
    max-width: 1000px;
    margin: 30px auto 50px;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 20px;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 18px;

    background: linear-gradient(135deg, #2b2b2b, #0f0f0f);
    border: 1px solid rgba(255,255,255,0.08);

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    /* troca isso pela sua foto depois */
    background-image: url("https://scontent.fcpq17-1.fna.fbcdn.net/v/t39.30808-6/653878469_4085529348258320_1249154830238077962_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeHtkSEfWciuuHsWODXF7MjbNkCyyntuJ4Q2QLLKe24nhESTUj4bKxrkJGLMOYhb8YX97UC3oDGpY7KmzahhnPgS&_nc_ohc=Yoh3dZCt1vUQ7kNvwHhIgRZ&_nc_oc=AdrYwXNiJL46LdQERiWnGf5xq3a-3pl4dyoWz22hAgAtqt-t914baotU2rZFJjT1kWiMYiv3xRmAkVYJ24zQnief&_nc_zt=23&_nc_ht=scontent.fcpq17-1.fna&_nc_gid=YmHTSBqyCPouuuuhfn3_4A&_nc_ss=7b2a8&oh=00_Af1K3EAAXgJWjt59k4la_RYVbKJ8D_YvcTwfyA6WHTX7fQ&oe=69EF14CE");
    background-size: cover;
    background-position: center;
}

.hero-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.role {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
}

.sub {
    font-size: 12px;
    opacity: 0.65;
    margin-top: 4px;
    max-width: 600px;
}
h1 {
    margin-bottom: 10px;
}

</style>

</head>
<body>

<h1>Rafael Reis</h1>


<div class="hero">
    <div class="avatar"></div>

    <div class="hero-text">
        <div class="role">

        </div>

        <div class="sub">
            Desenvolvimento de sistemas interativos • Totens • Jogos • Experiências físicas e digitais
        </div>

</div>

<div id="container"></div>

<script>

            },
            {

            },
            {

            },
            {

            },
            {

            },
            {

            },
            {
                url: "https://youtube.com/shorts/bYsvw8Zd6Ks",
                desc: "Integração Cadeiras + Video - Sala Cinema interativo"
            },
            {
                url: "https://youtube.com/shorts/xk0lBn4F67A",
                desc: "Primeiros testes audio e video - Cinema Interativo"
            },

            },
            {
                url: "https://vimeo.com/1185647781",

        ]

    {
        title: "CASE / NEW HOLLAND - Projeto Agrícola",
        items: [

                desc: "Realidade Aumentada, Roleta Premiada, Receitas Moça - Nestlé"
            }
        ]
    }
];

const container = document.getElementById("container");

// =========================
// RENDER
// =========================

portfolioData.forEach(section => {

    const sec = document.createElement("div");
    sec.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerText = section.title;

    const grid = document.createElement("div");
    grid.className = "grid";

    section.items.forEach(item => {
        grid.appendChild(createSlot(item));
    });

    sec.appendChild(title);
    sec.appendChild(grid);

    container.appendChild(sec);
});

// =========================
// SLOT
// =========================

function createSlot(item) {

    const url = item.url;
    const desc = item.desc || "";

    const slot = document.createElement("div");
    slot.className = "slot";

    if (!url) {
        slot.innerHTML = `<div class="empty">Sem mídia</div>`;
        return slot;
    }

    let media;

    // YouTube
    if (url.includes("youtube.com") || url.includes("youtu.be")) {

        const id = getYouTubeID(url);

        media = document.createElement("img");
        media.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

        slot.onclick = () => {
            window.open(`https://www.youtube.com/watch?v=${id}`, "_blank");
        };
    }

    // Vimeo
    else if (url.includes("vimeo.com")) {

        const id = getVimeoID(url);

        media = document.createElement("iframe");
        media.src = `https://player.vimeo.com/video/${id}`;
        media.frameBorder = 0;
        media.allow = "autoplay; fullscreen; picture-in-picture";

        slot.onclick = () => window.open(url, "_blank");
    }

    else {
        slot.innerHTML = `<div class="empty">Link inválido</div>`;
        return slot;
    }

    slot.appendChild(media);

    // descrição
    if (desc) {
        const d = document.createElement("div");
        d.className = "desc";
        d.innerText = desc;
        slot.appendChild(d);
    }

    return slot;
}

// =========================
// HELPERS
// =========================

function getYouTubeID(url) {
    const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(reg);
    return match ? match[1] : "";
}

function getVimeoID(url) {
    const match = url.match(/vimeo\.com\/(\d+)/);
    return match ? match[1] : "";
}

</script>

</body>
</html>
